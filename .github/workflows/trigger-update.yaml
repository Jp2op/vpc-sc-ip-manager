name: Trigger VPC SC Update

on:
  push:
    branches: [main]
    paths:
      - 'access_config.json'

env:
  CLOUD_RUN_URL: "https://vpc-sc-updater-xxxxx-uc.a.run.app"  # YOUR URL FROM STEP 4
  WIF_PROVIDER: "projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
  SERVICE_ACCOUNT: "github-trigger@PROJECT_ID.iam.gserviceaccount.com"

jobs:
  trigger-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Get ID token and trigger Cloud Run
        run: |
          TOKEN=$(gcloud auth print-identity-token --audiences=${{ env.CLOUD_RUN_URL }})
          CONFIG=$(cat access_config.json)

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ env.CLOUD_RUN_URL }}/update" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"config\": $CONFIG}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Cloud Run returned $HTTP_CODE"
            exit 1
          fi