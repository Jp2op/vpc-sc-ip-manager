name: Trigger VPC SC Update

on:
  push:
    branches: [main]
    paths:
      - 'access_config.json'

env:
  CLOUD_RUN_URL: ${{ vars.CLOUD_RUN_URL }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  SERVICE_ACCOUNT: ${{ vars.SERVICE_ACCOUNT }}
  BACKEND_URL: ${{ vars.BACKEND_URL }}
  BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}

jobs:
  trigger-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.CLOUD_RUN_URL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Trigger Cloud Run
        id: vpc_update
        run: |
          CONFIG=$(cat access_config.json)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ env.CLOUD_RUN_URL }}/update" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.id_token }}" \
            -H "Content-Type: application/json" \
            -d "{\"config\": $CONFIG}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "result=failed" >> "$GITHUB_OUTPUT"
            echo "error=$BODY" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "result=applied" >> "$GITHUB_OUTPUT"

      - name: Callback — Success
        if: success()
        run: |
          curl -s -X POST \
            "${{ env.BACKEND_URL }}/pipeline/callback" \
            -H "X-API-Key: ${{ env.BACKEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status": "applied"}'

      - name: Callback — Failed
        if: failure()
        run: |
          curl -s -X POST \
            "${{ env.BACKEND_URL }}/pipeline/callback" \
            -H "X-API-Key: ${{ env.BACKEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status": "failed", "error": "VPC SC update failed"}'