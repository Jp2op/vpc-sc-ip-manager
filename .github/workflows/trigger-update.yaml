name: Trigger VPC SC Update

on:
  push:
    branches:
      - main
    paths:
      - access_config.json

env:
  CLOUD_RUN_URL: ${{ vars.CLOUD_RUN_URL }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  SERVICE_ACCOUNT: ${{ vars.SERVICE_ACCOUNT }}

jobs:
  trigger-update:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud and Generate ID Token
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.CLOUD_RUN_URL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify Authentication
        run: |
          gcloud auth list
          gcloud config list

      - name: Trigger Cloud Run
        run: |
          CONFIG=$(cat access_config.json)

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "${{ env.CLOUD_RUN_URL }}/update" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.id_token }}" \
            -H "Content-Type: application/json" \
            -d "{\"config\": $CONFIG}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response ($HTTP_CODE):"
          echo "$BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Cloud Run returned $HTTP_CODE"
            exit 1
          fi